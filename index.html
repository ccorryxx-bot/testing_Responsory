<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Diamond-BETT</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="topArea">
  <div class="banner-wrap" id="bannerWrap">
    <div class="banner-track" id="bannerTrack">
      <div class="banner-slide" style="background:linear-gradient(135deg,#1a0850,#5a0095);">
        <div class="banner-placeholder"><div style="font-size:11px;color:rgba(255,255,255,.6);">PRAGMATIC PLAY</div><div class="b-title" style="color:#f5c518;">Gates of OLYMPUS</div><div class="b-sub">ZEUS ရဲ့ အင်အား</div><div class="b-amount">10,000</div></div>
      </div>
      <div class="banner-slide" style="background:linear-gradient(135deg,#041840,#0060b0);">
        <div class="banner-placeholder"><div style="font-size:11px;color:rgba(255,255,255,.6);">LIVE CASINO</div><div class="b-title" style="color:#40cfff;">Real Dealers</div><div class="b-sub">တိုက်ရိုက် ကာစိနို</div><div class="b-amount" style="color:#40cfff;">50,000</div></div>
      </div>
      <div class="banner-slide" style="background:linear-gradient(135deg,#300808,#900018);">
        <div class="banner-placeholder"><div style="font-size:11px;color:rgba(255,255,255,.6);">TOURNAMENT</div><div class="b-title" style="color:#ff5060;">Grand Prize</div><div class="b-sub">နှစ်တိုင်း ဆုငွေကြီး</div><div class="b-amount" style="color:#ff7080;">100,000</div></div>
      </div>
    </div>
    <div class="banner-dots" id="bannerDots"><div class="dot active" data-i="0"></div><div class="dot" data-i="1"></div><div class="dot" data-i="2"></div></div>
  </div>

  <div class="quick-nav">
    <button class="login-btn" id="showAuthBtn">လော့ဂ်အင်</button>
    <div class="wallet-btns" id="walletBtns">
      <button class="wallet-btn deposit">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12l7 7 7-7"/></svg>ငွေသွင်း
      </button>
      <button class="wallet-btn withdraw">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>ငွေထုတ်
      </button>
    </div>
    <div class="nav-icons">
      <a class="nav-icon-btn" href="https://ccorryxx-bot.github.io/glm-45-air_free-to-Cloud-api/" target="_blank" rel="noopener">
        <div class="nav-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 20h16"/></svg></div><span>ဒေါင်းလုပ်</span>
      </a>
      <button class="nav-icon-btn" id="historyBtn">
        <div class="nav-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 7h8M8 11h8M8 15h5"/></svg></div><span>မှတ်တမ်း</span>
      </button>
      <button class="nav-icon-btn" id="langBtn">
        <div class="nav-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10"/><path d="M12 2a15 15 0 0 0-4 10 15 15 0 0 0 4 10"/></svg></div>
        <span class="lang-label" id="langLabel">မြန်မာ</span>
      </button>
    </div>
  </div>

  <div class="announce">
    <span class="announce-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 0-7 7v3l-2 3h18l-2-3V9a7 7 0 0 0-7-7z"/><path d="M9 19a3 3 0 0 0 6 0"/></svg></span>
    <div class="announce-ticker"><span>ကြိုဆိုပါတယ်! Diamond-BETT မှာ မှတ်ပုံတင်ပြီး ဆုငွေများ ရယူပါ။</span></div>
  </div>
</div>

<!-- MAIN — Page panels will be loaded here -->
<div class="main" id="mainContent">
  <div id="pageContainer"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="bnav-btn" data-nav="home"><span class="bnav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7"/><path d="M9 22V12h6v10"/><path d="M21 22H3"/></svg></span><span>Home</span></button>
  <button class="bnav-btn" data-nav="tasks"><span class="bnav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></span><span>Tasks</span></button>
  <button class="bnav-btn" data-nav="agent"><span class="bnav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span><span>Agent</span></button>
  <button class="bnav-btn" data-nav="cs"><span class="bnav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span><span>CS</span></button>
  <button class="bnav-btn" data-nav="account"><span class="bnav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><span>Account</span></button>
</nav>

<!-- ============ GLOBAL MODALS (keep as is) ============ -->

<!-- AGENT LEVEL MODAL -->
<div class="level-modal" id="levelModal">...</div>
<!-- DATE MODAL -->
<div class="overlay-backdrop" id="dlBackdrop"></div>
<div class="dl-date-modal" id="dlDateModal">...</div>
<!-- SPIN RESULT -->
<div class="spin-result-overlay" id="spinResultOverlay">...</div>
<!-- AUTH MODAL -->
<div id="authModal" class="modal">...</div>
<!-- DEPOSIT MODAL -->
<div id="depositModal" class="dep-modal">...</div>
<!-- WITHDRAW MODAL -->
<div id="withdrawModal" class="dep-modal">...</div>
<!-- ACCOUNT LINK SHEET -->
<div id="acctSheet" class="acct-sheet">...</div>
<!-- TURNOVER BLOCK MODAL -->
<div id="tvModal" class="tv-modal">...</div>
<!-- Toast -->
<div id="gToast"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
